name: Deploy Lina in Berlin

on:
  push:
    branches:
      - main
    paths:
      - 'audio/**'
      - 'images/**'
      - 'site/**'
      - 'build_site.py'
      - 'generate.py'
      - 'generate_audio.py'
      - 'story.json'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Link Vercel Project
        working-directory: site
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx --yes vercel link --yes --project site --scope outstride-hq --token "$VERCEL_TOKEN"

      - name: Deploy to Vercel
        working-directory: site
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx --yes vercel deploy --prod --yes --scope outstride-hq --token "$VERCEL_TOKEN"
